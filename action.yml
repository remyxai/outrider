name: 'Remyx Outrider'
description: 'Scouts arXiv for the next paper most implementable against your codebase and drafts a PR or opens an issue.'
branding:
  icon: 'compass'
  color: 'purple'

inputs:
  interest-id:
    description: |
      Remyx ResearchInterest UUID. Get it from engine.remyx.ai → your
      interest's detail page → "Workflow snippet" tab.
    required: true
  mode:
    description: |
      Run mode:
        - "recommend" (default): scout a paper, draft a PR or open an
          Issue — the classic per-run flow.
        - "weekly-summary": aggregate the past 7 days of Outrider runs
          on this repo and post a digest comment to the Discussion named
          by `weekly-discussion-id`. Opt-in; customers add a second
          scheduled job (weekly cron) that calls the action in this
          mode. Requires `discussions: write` in the workflow's
          permissions block.
        - "fidelity": audit a remyx-ai[bot] draft PR against its paper's
          reference impl, append a structured ``## Coverage`` matrix to
          the PR body, and transition the PR's labels
          (outrider:draft → outrider:fidelity-done, or
          outrider:needs-judgment when an item flags for human review).
          Triggered by the workflow on ``pull_request: labeled`` with
          name=outrider:draft; requires ``pr-number`` to be set (from
          the event payload). Read-only for the codebase (only mutates
          the PR body + labels).
        - "convention": extract contributor conventions from the target
          repo's (or upstream's, for forks) recent merged PRs, identify
          convention-shape misalignments in the draft, run an agentic
          patch session bounded to non-algorithmic changes, force-push
          with bot attribution, and post an evidence comment listing
          the patterns + their source PRs. Triggered by
          ``outrider:fidelity-done``; requires ``pr-number``.
        - "test": run lint + targeted tests on the PR's added/modified
          files, write a ``## Refinement checks`` section to the
          action's run-summary panel, drop the PR's draft state on a
          passing run (the canonical GitHub "ready for review" signal),
          and apply the ``outrider:test-failed`` label only on hard
          failure (lint surfaced issues or tests failed). PR body is
          untouched — that's the convention pass's surface. Triggered
          after the convention pass; requires ``pr-number``.
        - "issue-convention": fold an Outrider-drafted Issue's body to
          the target repo's ``.github/ISSUE_TEMPLATE/`` shape (markdown
          frontmatter or Issue Forms). Picks the best-fitting template
          via a single Claude one-shot (filtering out bug/question
          kinds), then PATCHes the Issue body. Mirrors the PR-route
          convention pass but with no diff to patch, no draft state,
          and no test gate — just the body rewrite. Triggered inline
          in recommend mode when routing to Issue, or explicitly via
          a standalone ``mode: issue-convention`` workflow_dispatch;
          requires ``issue-number``.
    required: false
    default: 'recommend'
  chain:
    description: |
      When true (default), recommend mode automatically continues into the
      refinement chain (fidelity audit → convention pass → test gate) on the
      draft PR it just filed, within the same workflow run. This is the
      zero-config rollout: customers get the full chain without deploying
      the standalone outrider-fidelity / outrider-convention / outrider-test
      workflows or wiring the label triggers.

      Set to 'false' for cost-sensitive runs (recommend-only is ~$1-3 vs
      ~$5-6 with the chain) or when you intentionally run the chain via the
      separate-workflow pattern with `mode: fidelity/convention/test`.
    required: false
    default: 'true'
  pr-number:
    description: |
      PR number to operate on. Read in the per-phase chain modes
      (``fidelity`` / ``convention`` / ``test``); set from the workflow's
      pull_request event payload (or a workflow_dispatch input) when
      driving a single phase against an existing PR. Empty in recommend /
      weekly-summary modes — the inline chain (``chain: true``, default)
      threads the just-opened PR number through automatically, so most
      installs never set this.
    required: false
    default: ''
  issue-number:
    description: |
      Issue number to operate on. Read in ``mode: issue-convention`` only;
      set from the workflow's issues event payload (or a workflow_dispatch
      input) when driving the Issue-route convention pass against an
      existing Issue. Empty in recommend / weekly-summary modes — the
      inline chain (``chain: true``, default) threads the just-opened
      Issue number through automatically when recommend mode routes to an
      Issue instead of a PR, so most installs never set this.
    required: false
    default: ''
  weekly-discussion-id:
    description: |
      Target Discussion for weekly-summary mode. Accepts the Discussion
      number (from its URL) or the GraphQL node ID. Only read when
      `mode: weekly-summary`; the mode skips cleanly when empty.
    required: false
    default: ''
  github-token:
    description: >-
      GitHub token used for git push, PR / Issue creation, and the
      existing-PR dedup check. Leave empty for the standard same-repo
      install — the action self-mints a remyx[bot] token from
      engine.remyx.ai (using REMYX_API_KEY) so artifacts are authored
      by the Remyx App by default, and falls back to the workflow's
      built-in github.token when minting isn't available. Override
      with a PAT only for cross-repo controller patterns (action runs
      in repo A but writes PRs to repo B); the PAT needs `repo` scope
      on the target.
    required: false
    default: ''
  min-confidence:
    description: |
      Tier gate. Recommendations below this confidence are skipped.
      One of: "high" | "moderate" | "low". Default: moderate.
    required: false
    default: 'moderate'
  draft-mode:
    description: |
      PR-draft policy:
        - "always":          every PR opens as draft (default; future
                             Modal-eval webhook will flip to ready)
        - "on_test_failure": tests pass → ready, tests fail → draft
        - "never":           tests pass → ready, tests fail → skip
    required: false
    default: 'always'
  rate-limit-days:
    description: |
      Cadence guard window. Skip the run if the most recently opened
      Remyx Recommendation artifact (PR or Issue) on the target repo is
      *younger* than this many days. Older open artifacts age out of the
      throttle window and stop blocking — real maintainers leave Issues
      open for weeks without active triage, and the action should resume
      cadence rather than mute the repo indefinitely. Engagement (merge
      or close) still clears the gate immediately. Per-paper dedup (a
      separate gate) handles same-recommendation retries — this guard is
      purely about not stacking *recent* unresolved work. Set to 0 to
      disable the guard entirely (useful for batch trials).
    required: false
    default: '7'
  guardrails-allowlist:
    description: |
      Comma-separated extra path globs Claude Code may touch, ADDED ON TOP
      OF the defaults (`*.py`, `.remyx-recommendation/**`, `**/*.md`).
      Extends the defaults — it does not replace them. Matching is
      case-insensitive. Most repos won't need this.
    required: false
    default: ''
  test-integration-policy:
    description: |
      How to handle the test-integration gate, which requires that new
      tests import from a pre-existing module (or that an existing
      package module imports the new module). One of:

        strict (default) — if the gate fails, route the run to an Issue
                           instead of opening a PR. Best for application/
                           pipeline repos where standalone-module
                           contributions are usually scaffold-shaped.
        soft             — if the gate fails, still open the PR as a
                           draft and add a warning section to the body
                           noting the missing integration. Best for
                           layer/component repos (graph NN, kernels)
                           where a new standalone module IS the
                           contribution.
        off              — skip the gate entirely. Relies on the other
                           validators (path allowlist, integration check,
                           stub density, self-review) to keep PRs honest.
    required: false
    default: 'strict'
  lookback:
    description: |
      Recommendation lookback window. The action pulls the candidate pool
      over this window, then a Claude selection pass picks the candidate
      most directly implementable against the target repo (relevance rank
      alone often surfaces a model-architecture paper with no call site).
      One of: "today" | "week" | "month". Default: "week" (past 7 days).
    required: false
    default: 'week'
  candidate-pool:
    description: |
      How many recommendations to pull into the selection pool over the
      lookback window. The selection pass picks the most implementable
      one; the rest are recorded as "rejected" with a reason. Default 25
      (the API returns up to whatever Remyx retains for the interest, so
      a larger pool just widens the window the selection pass sees).
    required: false
    default: '25'
  claude-timeout:
    description: |
      Wall-clock seconds for the Claude Code agent calls (preflight
      routing + implementation). Large repos can exceed the old 600s;
      default is 900. Bump it for very large codebases or slower non-
      default backends; lower it to cap cost. Both stages share the
      same ceiling so a single knob covers per-dispatch budget tuning.
    required: false
    default: '900'
  lead-content:
    description: |
      Optional scoped implementation spec (verbatim LEAD content from a
      prior Outrider Issue's `lead_content` field). When set, replaces
      the paper's `suggested_experiment` in SPEC.md — Claude Code's
      implementation is driven by the LEAD's scoped experiment rather
      than the paper's own contribution framing. Use this to convert a
      LEAD Issue into a Draft PR without changing the paper reference
      (dispatch with pin-arxiv=<paper> + lead-content=<LEAD's scoped
      experiment>). Empty = normal paper-driven implementation.
    required: false
    default: ''
  pin-arxiv:
    description: |
      Optional arxiv_id. When set and present in the candidate pool, the
      action implements that exact paper and skips the LLM selection pass —
      use it for reproducible eval re-runs. Empty = normal selection.
    required: false
    default: ''
  search-method:
    description: |
      Free-text method/technique query (e.g. "riemannian preconditioning
      LoRA optimizer"). When set, Outrider runs the engine's search to
      find the top-hit arxiv paper matching the query and implements it —
      overriding the interest's ranked pool. Use for exploratory dispatches
      when you know the method family but not the specific arxiv id. For
      reproducible re-runs of a known paper, use pin-arxiv instead. Empty
      = normal selection. Mutually exclusive with pin-arxiv.
    required: false
    default: ''
  publish:
    description: |
      What to produce at the end of a recommend-mode run:
        - "pr" (default): current behavior — push branch, open Draft PR,
          run the inline chain (fidelity → convention → test).
        - "branch": push the branch to the fork, but SKIP PR creation
          and SKIP the inline chain. Coordination signal and evidence
          land in the workflow step summary + workflow artifact only.
          Team reviews the branch via `gh` / GitHub UI and runs
          `gh pr create` themselves when ready to ship.

      Zero maintainer-facing artifact until the team explicitly opens
      the PR. Useful for batched multi-candidate exploration where you
      want to review before committing to shipping.
    required: false
    default: 'pr'
  model-base-url:
    description: |
      Optional override for the Claude Code subprocess's ANTHROPIC_BASE_URL.
      Use this to route the coding agent to any Anthropic-Messages-compatible
      backend — e.g. z.ai's GLM Coding Plan, AWS Bedrock, GCP Vertex, an
      on-prem proxy. The ANTHROPIC_API_KEY repo secret should hold the
      backend's API key when this is set, not your Anthropic key. Empty
      (default) = api.anthropic.com. Note: when set, the `total_cost_usd`
      that the Claude Code CLI reports is computed with Anthropic-rate
      pricing applied to the backend's tokens — it's an estimate, not a
      bill. Token counts remain accurate.
    required: false
    default: ''
  enable-cocoindex:
    description: |
      Install cocoindex-code as a Claude Code skill on the runner so the
      selection + implementation agent has AST-based semantic code search
      available (grounds call-site claims on real paths instead of
      speculating). Adds ~60-90s to the run's install phase and ~1 GB of
      torch/transformers deps to the runner. Set to 'false' to skip.

      Also gates the "Convention precedents (via cocoindex AST search)"
      enrichment on Issue bodies — the post-drafting convention-
      verification section requires ccc on PATH to fire, so turning this
      off silently drops that enrichment too.
    required: false
    default: 'true'

outputs:
  status:
    description: |
      Run outcome: "pr_opened" | "pr_opened_draft" | "issue_opened" |
      "skipped_low_confidence" | "skipped_open_artifact" |
      "skipped_issues_disabled" | "skipped_pr_exists" |
      "skipped_issue_exists" | "skipped_test_failure" | "claude_failed" |
      "skipped_no_method_match" | "rejected_path_violations" |
      "aborted_secret_in_payload" | "error". In weekly-summary mode:
      "weekly_summary_posted" | "weekly_summary_skipped_no_discussion_id" |
      "weekly_summary_failed".
    value: ${{ steps.recommend.outputs.status }}
  discussion_comment_url:
    description: |
      URL of the posted weekly-summary Discussion comment (set when
      status == "weekly_summary_posted").
    value: ${{ steps.recommend.outputs.discussion_comment_url }}
  pr_url:
    description: 'URL of the opened PR (set when status starts with "pr_opened").'
    value: ${{ steps.recommend.outputs.pr_url }}
  issue_url:
    description: 'URL of the opened Issue (set when status == "issue_opened").'
    value: ${{ steps.recommend.outputs.issue_url }}
  arxiv:
    description: 'arxiv_id of the recommended paper.'
    value: ${{ steps.recommend.outputs.arxiv }}
  tier:
    description: 'Confidence tier of the recommendation (high / moderate / low / noise).'
    value: ${{ steps.recommend.outputs.tier }}
  cost_usd:
    description: 'Total Anthropic cost (USD) across all Claude passes this run.'
    value: ${{ steps.recommend.outputs.cost_usd }}
  input_tokens:
    description: 'Total input tokens across all Claude passes this run.'
    value: ${{ steps.recommend.outputs.input_tokens }}
  output_tokens:
    description: 'Total output tokens across all Claude passes this run.'
    value: ${{ steps.recommend.outputs.output_tokens }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node (for Claude Code CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Claude Code CLI
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
        claude --version

    - name: Install pytest + remyxai CLI (validation + selection-pass tool-use)
      shell: bash
      run: pip install pytest remyxai

    - name: Install poppler-utils (pdftotext for arxiv PDF license retry)
      shell: bash
      # pdftotext is the last-resort discovery source when arxiv HTML 404s
      # for a paper. Not shipped by default on ubuntu-latest runners as of
      # 2026; installing it here keeps the license-retry path from silently
      # returning empty on HTML-less arxiv papers.
      run: sudo apt-get install -y --no-install-recommends poppler-utils

    - name: Install gh-graph selection-pass tool on PATH
      shell: bash
      # Dependency-navigation helper the selection agent calls via its Bash
      # tool (`gh-graph <file>`) to walk a module's imports + reverse-imports.
      # /usr/local/bin is already on PATH in the runner; the agent runs with
      # cwd = the cloned target repo, so paths resolve repo-relative.
      run: |
        install -m 0755 "${{ github.action_path }}/src/gh_graph.py" /usr/local/bin/gh-graph
        gh-graph --selftest

    - name: Install cocoindex-code as Claude Code skill
      if: ${{ inputs.enable-cocoindex == 'true' }}
      shell: bash
      # Attach cocoindex-code as a Claude Code skill so the Outrider agent
      # can perform AST-based semantic code search during selection and
      # implementation, and so the convention-precedents enrichment on
      # Issue bodies has ccc on PATH to enumerate structural precedents
      # for sibling claims. Costs ~60-90s runner time on install; free
      # thereafter. Set enable-cocoindex=false to skip.
      #
      # Idempotent — if the workflow already installed cocoindex (older
      # setup-local flow from v0.4.4), the `command -v` guard skips the
      # duplicate install.
      run: |
        if ! command -v ccc >/dev/null 2>&1; then
          pipx install 'cocoindex-code[full]'
        fi
        mkdir -p ~/.claude/skills
        if [ ! -e ~/.claude/skills/cocoindex-code ]; then
          git clone --depth 1 https://github.com/cocoindex-io/cocoindex-code /tmp/cocoindex-code
          ln -sfn /tmp/cocoindex-code ~/.claude/skills/cocoindex-code
        fi
        # Sanity check that ccc is on PATH. `ccc --version` would need a
        # dedicated version flag that the typer app doesn't expose (raises
        # a red "No such option" error box that scares readers even when
        # suppressed). `command -v` is quiet and definitive.
        command -v ccc >/dev/null 2>&1 && echo "ccc installed: $(command -v ccc)" || echo "warning: ccc not on PATH after install"

    - name: Write ENVIRONMENTS.md so the selection agent knows ccc is available
      if: ${{ inputs.enable-cocoindex == 'true' }}
      shell: bash
      # ENVIRONMENTS.md is read by the selection pass in run.py to surface
      # workflow-attached tooling to the agent. Written to CWD (the target
      # repo checkout) so the selection agent picks it up during the same
      # run. Not committed — this is a runtime file only.
      #
      # Only writes when no ENVIRONMENTS.md exists — respects a
      # user-customized file listing additional workflow-attached tools.
      run: |
        if [ ! -f ENVIRONMENTS.md ]; then
          cat > ENVIRONMENTS.md <<'EOF'
        - title: cocoindex-code AST search available
          description: cocoindex-code AST-based semantic code search is pre-installed as a Claude Code skill.
          resource: https://github.com/cocoindex-io/cocoindex-code
          tags: [outrider, environment, cocoindex-code, ast-search]
          surface: |
            # Environment: cocoindex-code AST search
            - Available as a Claude Code skill for grounding call-site claims on real AST paths.
            - Invocable via /ccc slash command or ambient use during selection/implementation.
        EOF
        fi

    - name: Configure git identity
      shell: bash
      # Global fallback identity. The branch head is normally re-authored
      # via the git data API with the App token (run.py → _recommit_via_api),
      # which stamps remyx-ai[bot] and signs the commit. run.py also sets a
      # repo-local identity in the clone. This global value only applies if
      # both of those are bypassed; use the bot's GitHub no-reply identity so
      # it still links to remyx-ai[bot] (id 289541483).
      run: |
        git config --global user.name "remyx-ai[bot]"
        git config --global user.email "289541483+remyx-ai[bot]@users.noreply.github.com"

    - name: Recommend + implement + open PR
      id: recommend
      shell: bash
      env:
        # GITHUB_TOKEN: always set from the workflow's built-in token,
        # which works for same-repo installs. Cross-repo controllers
        # override via INPUT_GITHUB_TOKEN below; run.py prefers that
        # when set. (Two env vars, not `${{ a || b }}`, because the
        # GitHub Actions || operator evaluates empty-string inputs in
        # a way that returns '' rather than falling through to the
        # right operand — observed via the v1.0.3 push failure.)
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        TARGET_REPO: ${{ github.repository }}
        INPUT_INTEREST_ID: ${{ inputs.interest-id }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_DRAFT_MODE: ${{ inputs.draft-mode }}
        INPUT_RATE_LIMIT_DAYS: ${{ inputs.rate-limit-days }}
        INPUT_GUARDRAILS_ALLOWLIST: ${{ inputs.guardrails-allowlist }}
        INPUT_TEST_INTEGRATION_POLICY: ${{ inputs.test-integration-policy }}
        INPUT_CLAUDE_TIMEOUT: ${{ inputs.claude-timeout }}
        INPUT_PIN_ARXIV: ${{ inputs.pin-arxiv }}
        INPUT_SEARCH_METHOD: ${{ inputs.search-method }}
        INPUT_PUBLISH: ${{ inputs.publish }}
        INPUT_LEAD_CONTENT: ${{ inputs.lead-content }}
        INPUT_MODEL_BASE_URL: ${{ inputs.model-base-url }}
        # PR number to audit in fidelity mode (set from the workflow's
        # pull_request event payload; empty in recommend / weekly-summary).
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        # Issue number to operate on in ``mode: issue-convention``. Empty
        # in recommend mode — the inline chain reads result["issue_number"]
        # directly when recommend routes to an Issue.
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        # Inline refinement chain toggle (recommend mode continues into
        # fidelity → convention → test by default; 'false' opts out).
        INPUT_CHAIN: ${{ inputs.chain }}
        # Weekly Discussion summary (opt-in second scheduled job).
        REMYX_MODE: ${{ inputs.mode }}
        REMYX_WEEKLY_DISCUSSION_ID: ${{ inputs.weekly-discussion-id }}
        # Lookback window + pool size for the candidate selection pass.
        # run.py reads these directly (not via INPUT_*) — they default to
        # week / 10 in run.py too, so omitting them is safe.
        REMYX_RECOMMENDATION_PERIOD: ${{ inputs.lookback }}
        REMYX_RECOMMENDATION_LIMIT: ${{ inputs.candidate-pool }}
      run: |
        python ${{ github.action_path }}/src/run.py
